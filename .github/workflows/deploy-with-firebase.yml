name: Deploy with Firebase Setup

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set Firebase Env Vars on Vercel via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Set FIREBASE_PROJECT_ID
          curl -X POST https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "FIREBASE_PROJECT_ID",
              "value": "portfolio-messages-858f3",
              "target": ["production", "preview"]
            }'
          
          # Set FIREBASE_CLIENT_EMAIL
          curl -X POST https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "FIREBASE_CLIENT_EMAIL",
              "value": "firebase-adminsdk-fbsvc@portfolio-messages-858f3.iam.gserviceaccount.com",
              "target": ["production", "preview"]
            }'
          
