<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Startup Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Startup Screen Container */
        .startup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .startup-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .startup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* Greeting Text */
        .greeting {
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: #ffffff;
            text-align: center;
            line-height: 1.1;
            opacity: 0;
            animation: greetingFadeInScale 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes greetingFadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.85);
                filter: blur(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
        }

        .greeting.exit {
            animation: greetingFadeOutScale 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes greetingFadeOutScale {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: scale(1.1);
                filter: blur(10px);
            }
        }

        /* Language label and progress bar removed for minimal startup look */

        /* Main Content */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-out 0.2s;
            pointer-events: none;
        }

        .main-content.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .greeting {
                font-size: clamp(50px, 12vw, 90px);
            }
        }

        @media (max-width: 480px) {
            .greeting {
                font-size: clamp(40px, 10vw, 70px);
            }
        }

        /* Dark mode adjustment */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000000;
                color: #ffffff;
            }
        }
    </style>
</head>
<body>
    <!-- Startup Screen -->
    <div class="startup-screen" id="startupScreen">
        <div class="startup-content">
            <div class="greeting" id="greeting">Hello</div>
        </div>
    </div>

    <!-- Main Website Content -->
    <div class="main-content" id="mainContent">
        <header style="background: #f5f5f5; padding: 20px; text-align: center;">
            <h1>Welcome to Your Website</h1>
            <p>The startup screen just finished loading</p>
        </header>
        <main style="padding: 40px; text-align: center; background: white; min-height: 100vh;">
            <p>Your content goes here...</p>
        </main>
    </div>

    <script>
        // Greetings data with multiple languages
        const greetings = [
            { text: "Hello", language: "English" },
            { text: "नमस्ते", language: "Hindi" },
            { text: "Bonjour", language: "French" },
            { text: "Hola", language: "Spanish" },
            { text: "こんにちは", language: "Japanese" },
            { text: "안녕하세요", language: "Korean" },
            { text: "مرحبا", language: "Arabic" },
            { text: "Привет", language: "Russian" }
        ];

        const startupScreen = document.getElementById('startupScreen');
        const mainContent = document.getElementById('mainContent');
        const greetingElement = document.getElementById('greeting');
        // language label removed from UI; no DOM reference needed

        let currentIndex = 0;
        const greetingDuration = 8000; // total display goal (ms)
        const languageInterval = 1000; // Show each language for 1s so each is readable
        const totalDisplayTime = 9000; // 9 seconds before fade out

        // Function to update greeting
        function updateGreeting() {
            if (currentIndex >= greetings.length) {
                currentIndex = 0; // Loop back
            }

            // Remove animation classes
            greetingElement.classList.remove('exit');

            // Trigger reflow to restart animation
            void greetingElement.offsetWidth;

            // Update content (only greeting text)
            greetingElement.textContent = greetings[currentIndex].text;

            // Re-apply entrance animations
            greetingElement.style.animation = 'none';

            setTimeout(() => {
                greetingElement.style.animation = '';
            }, 10);

            currentIndex++;
        }

        // Cycle through greetings
        const greetingInterval = setInterval(updateGreeting, languageInterval);

        // Hide startup screen and show main content after display time
        setTimeout(() => {
            clearInterval(greetingInterval);

            // Add exit animation classes
            greetingElement.classList.add('exit');

            // Fade out startup screen
            startupScreen.classList.add('fade-out');

            // Show main content
            mainContent.classList.add('visible');

            // Remove startup screen from DOM after animation
            setTimeout(() => {
                startupScreen.style.display = 'none';
            }, 800);
        }, totalDisplayTime);

        // Alternative: Manual trigger for demo (click anywhere to skip)
        document.addEventListener('click', () => {
            if (!startupScreen.classList.contains('fade-out')) {
                clearInterval(greetingInterval);
                startupScreen.classList.add('fade-out');
                mainContent.classList.add('visible');
                startupScreen.style.display = 'none';
            }
        });

        // Initialize
        updateGreeting();
    </script>
</body>
</html>
